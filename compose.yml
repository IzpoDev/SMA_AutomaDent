services:
  mcp-server:
    build: .
    container_name: mcp-server
    command: python mcp_server.py
    restart: always
    env_file:
      - .env
    ports:
      - "8001:8001"
    networks:
      - automadent-net

  api-rest:
    build: .
    container_name: automadent-api
    command: uvicorn api:app --host 0.0.0.0 --port 8000
    restart: always
    env_file:
      - .env
    ports:
      - "8000:8000"
    networks:
      - automadent-net

  bot:
    build: .
    container_name: automadent-bot
    command: python main.py
    restart: always
    env_file:
      - .env
    environment:
      - MCP_SERVER_URL=http://mcp-server:8001/mcp
    depends_on:
      - mcp-server
    networks:
      - automadent-net

  dashboard:
    build: .
    container_name: automadent-dashboard
    command: streamlit run dashboard.py --server.port=8502 --server.address=0.0.0.0
    restart: always
    env_file:
      - .env
    ports:
      - "8502:8502"
    networks:
      - automadent-net

networks:
  automadent-net:
    driver: bridge
